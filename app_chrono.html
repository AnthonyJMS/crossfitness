<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Coach Séance · EPS BAC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0b0e1a;color:#e8eaf0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
.screen:not(.active){display:none!important}

/* ── LOGIN ── */
#s-login{background:linear-gradient(150deg,#0b0e1a 0%,#0f1424 100%);overflow:hidden}
.li-head{flex-shrink:0;padding:28px 20px 16px;text-align:center}
.li-icon{font-size:48px;margin-bottom:4px}
.li-badge{font-size:10px;letter-spacing:4px;color:#5a6177;text-transform:uppercase;margin-bottom:5px}
.li-title{font-size:24px;font-weight:900;color:#f0f2f8;font-family:Georgia,serif;margin-bottom:2px}
.li-sub{font-size:12px;color:#8892aa;margin-bottom:14px}
.li-instruct{font-size:12px;color:#5a6177;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:0 20px 8px;flex-shrink:0}
.stu-scroll{flex:1;overflow-y:auto;padding:0 14px;-webkit-overflow-scrolling:touch}
.stu-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:12px;margin-bottom:8px;cursor:pointer;border:1.5px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);transition:all .1s;font-size:15px;color:#d0d5e8;font-weight:500;-webkit-tap-highlight-color:transparent}
.stu-item:active{background:rgba(255,255,255,.12)}
.stu-item.sel{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.5);color:#fff;font-weight:700}
.stu-item.sel .stu-check{opacity:1}
.stu-check{font-size:18px;opacity:0;transition:opacity .15s;color:#f59e0b}
.li-foot{flex-shrink:0;padding:14px 14px 28px}
.go-btn{width:100%;padding:16px;background:linear-gradient(135deg,#f59e0b,#f97316);border:none;border-radius:14px;color:#0b0e1a;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
.go-btn:disabled{background:rgba(255,255,255,.06);color:#3a4158;cursor:not-allowed}
.go-btn:not(:disabled):active{opacity:.85}

/* ── SESSIONS ── */
#s-sessions{background:#0b0e1a}
.top-bar{background:#1e1b4b;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#a8b0c8;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.stu-hdr{color:#fff;font-weight:700;font-size:14px}
.vma-pill{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;margin-left:auto}
.sec-ttl{padding:18px 18px 10px;font-size:11px;color:#5a6177;text-transform:uppercase;letter-spacing:1px;font-weight:700;flex-shrink:0}
.ses-list{overflow-y:auto;flex:1;padding:0 14px 20px}
.ses-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px}
.ses-card:active{background:rgba(255,255,255,.08)}
.ses-num{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.ses-body{flex:1}
.ses-title{font-size:14px;font-weight:700;color:#f0f2f8;margin-bottom:3px}
.ses-desc{font-size:12px;color:#8892aa;margin-bottom:6px}
.ses-tags{display:flex;gap:6px;flex-wrap:wrap}
.ses-tag{background:rgba(255,255,255,.06);border-radius:20px;padding:3px 9px;font-size:10px;color:#6d7795;font-weight:600}
.ses-arr{color:#5a6177;font-size:20px}

/* ── PREVIEW ── */
#s-preview{background:#0b0e1a}
.prev-content{flex:1;overflow-y:auto;padding:18px}
.prev-banner{border-radius:14px;padding:18px;margin-bottom:14px}
.prev-num{font-size:10px;text-transform:uppercase;letter-spacing:2px;opacity:.7;margin-bottom:3px}
.prev-title{font-size:20px;font-weight:900;font-family:Georgia,serif;margin-bottom:3px}
.prev-dur{font-size:12px;opacity:.7}
.prev-sec{font-size:11px;font-weight:700;color:#5a6177;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}
.prev-phase-row{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:9px;margin-bottom:5px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.prev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.prev-lbl{font-size:13px;color:#d0d5e8;flex:1}
.prev-dur2{font-size:11px;color:#5a6177;font-weight:600}
.start-btn{width:100%;padding:16px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:18px}
.start-btn:active{opacity:.9}

/* ── ACTIVE ── */
#s-active{transition:background .5s ease}
.act-topbar{padding:10px 16px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.3);flex-shrink:0;z-index:10}
.act-back{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-family:inherit}
.act-sesname{flex:1;font-size:12px;color:rgba(255,255,255,.65);text-align:center}
.act-prog-lbl{font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap}
.prog-bar{height:3px;background:rgba(255,255,255,.12);flex-shrink:0}
.prog-fill{height:100%;background:rgba(255,255,255,.55);transition:width .4s}
.type-badge{text-align:center;padding:8px 0 2px;flex-shrink:0}
.type-pill{display:inline-block;padding:5px 16px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}
.act-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px;overflow:hidden}
.ser-lbl{font-size:12px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:2px}
.phase-lbl{font-size:20px;font-weight:900;color:#fff;text-align:center;margin-bottom:10px}

/* Timer ring */
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.ring-bg{fill:none;stroke:rgba(255,255,255,.1)}
.ring-arc{fill:none;stroke:rgba(255,255,255,.9);stroke-linecap:round;transition:stroke-dashoffset .6s linear,stroke .3s}
.ring-txt{position:absolute;text-align:center;pointer-events:none}
.t-val{font-size:48px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.t-sub{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* Plots */
.plots-wrap{text-align:center;margin-bottom:6px}
.plots-big{font-size:60px;font-weight:900;line-height:1}
.plots-lbl{font-size:13px;color:rgba(255,255,255,.7);font-weight:600;margin-top:2px}
.spd-lbl{font-size:13px;color:rgba(255,255,255,.55);text-align:center;margin-bottom:8px}
.hint-box{background:rgba(0,0,0,.25);border-radius:12px;padding:11px 16px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.5;text-align:center;max-width:340px;margin:0 auto}

/* Info phase */
.info-icon{font-size:52px;text-align:center;margin-bottom:10px}
.info-title{font-size:28px;font-weight:900;color:#fff;text-align:center;margin-bottom:8px;font-family:Georgia,serif}
.info-desc{font-size:15px;color:rgba(255,255,255,.8);text-align:center;margin-bottom:14px;line-height:1.5}
.ready-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:16px;padding:16px 40px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit}
.ready-btn:active{background:rgba(255,255,255,.3)}

/* Done */
.done-icon{font-size:64px;text-align:center;margin-bottom:10px}
.done-title{font-size:30px;font-weight:900;color:#fff;text-align:center;margin-bottom:8px;font-family:Georgia,serif}
.done-sub{font-size:15px;color:rgba(255,255,255,.8);text-align:center;margin-bottom:22px;line-height:1.5}
.home-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:13px;padding:13px 34px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* Controls */
.act-ctrl{flex-shrink:0;padding:10px 18px 22px;background:rgba(0,0,0,.3)}
.next-prev{font-size:11px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:8px}
.next-prev strong{color:rgba(255,255,255,.7)}
.ctrl-row{display:flex;gap:10px}
.btn-pause{flex:1;padding:13px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-pause:active{background:rgba(255,255,255,.2)}
.btn-next{flex:1.5;padding:13px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-next:active{background:rgba(255,255,255,.28)}

@keyframes flash{0%{opacity:.4}50%{opacity:1}100%{opacity:1}}
.flash{animation:flash .25s ease}

/* ── OBJECTIF (effort stopwatch) ── */
.target-row{text-align:center;margin-bottom:8px;font-size:14px;color:rgba(255,255,255,.55);font-weight:600}
.target-row strong{color:#fff;font-size:17px;margin-left:4px}

/* ── TABLEAU D'OBJECTIFS (info phase) ── */
.info-targets{background:rgba(0,0,0,.22);border-radius:13px;padding:11px 15px;margin:10px auto 14px;width:100%;max-width:360px;text-align:left}
.info-tgt-ttl{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;font-weight:700}
.info-tgt-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.info-tgt-row:last-child{border-bottom:none}
.info-tgt-lbl{font-size:13px;color:rgba(255,255,255,.7)}
.info-tgt-right{display:flex;align-items:center;gap:7px}
.info-tgt-time{font-size:14px;font-weight:900;color:#f59e0b}
.info-tgt-plots{font-size:10px;color:rgba(255,255,255,.3)}

/* ── BOUTON STOP ── */
.btn-stop{flex:1.5;padding:13px;background:rgba(239,68,68,.18);border:1.5px solid rgba(239,68,68,.45);color:#ff7070;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.btn-stop:active{background:rgba(239,68,68,.32)}
/* ── BOUTON RETOUR PHASE ── */
.btn-back{width:48px;padding:13px 0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#6d7795;border-radius:12px;font-size:17px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:opacity .15s}
.btn-back:active{background:rgba(255,255,255,.13);color:#c0c8dc}
.btn-back:disabled{opacity:.2;cursor:not-allowed}

/* ── ÉCRAN BILAN ── */
#s-recap{background:#0b0e1a}
.recap-scroll{flex:1;overflow-y:auto;padding:14px 14px 30px;-webkit-overflow-scrolling:touch}
.recap-hero{text-align:center;padding:18px 0 16px}
.recap-icon{font-size:50px;margin-bottom:6px}
.recap-title{font-size:22px;font-weight:900;color:#f0f2f8;font-family:Georgia,serif;margin-bottom:3px}
.recap-sub{font-size:12px;color:#5a6177;margin-bottom:20px}
.recap-sec{font-size:10px;font-weight:700;color:#5a6177;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px}
.recap-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;margin-bottom:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.recap-num{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.recap-info{flex:1;min-width:0}
.recap-lbl{font-size:13px;color:#c0c8dc;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recap-target{font-size:11px;color:#4a5168}
.recap-actual{font-size:20px;font-weight:900;color:#fff;line-height:1.1;font-variant-numeric:tabular-nums}
.recap-badge{font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;white-space:nowrap;margin-top:3px;display:inline-block}
.badge-ok{background:rgba(74,222,128,.15);color:#4ade80}
.badge-slow{background:rgba(248,113,113,.15);color:#f87171}
.badge-na{background:rgba(255,255,255,.07);color:#6b7280}
.recap-home-btn{width:100%;padding:15px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:13px;color:#d0d5e8;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
.recap-home-btn:active{background:rgba(255,255,255,.13)}
.recap-hist-btn{width:100%;padding:15px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:13px;color:#f59e0b;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.recap-hist-btn:active{background:rgba(245,158,11,.2)}

/* ── HISTORIQUE ── */
#s-history{background:#0b0e1a}
.hist-list{flex:1;overflow-y:auto;padding:0 14px 30px;-webkit-overflow-scrolling:touch}
.hist-entry{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hist-name{font-size:14px;font-weight:700;color:#f0f2f8}
.hist-meta{font-size:11px;color:#5a6177;margin-top:1px}
.hist-ses-pill{font-size:11px;font-weight:700;background:rgba(245,158,11,.15);color:#f59e0b;border-radius:20px;padding:3px 10px;white-space:nowrap}
.hist-divider{height:1px;background:rgba(255,255,255,.06);margin:8px 0}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:12px}
.hist-row-lbl{color:#8892aa;flex:1;padding-right:8px}
.hist-row-right{text-align:right}
.hist-row-time{font-size:15px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;display:block}
.hist-clear-btn{width:100%;padding:12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:12px;color:#f87171;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.hist-clear-btn:active{background:rgba(239,68,68,.18)}
.hist-empty{text-align:center;padding:70px 20px;color:#4a5168;font-size:14px;line-height:1.8}
.hist-icon-btn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:#f59e0b;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;font-weight:700}
.hist-icon-btn:active{background:rgba(245,158,11,.22)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="li-head">
    <div class="li-icon">🏃</div>
    <div class="li-badge">EPS BAC · CA1 · Demi-fond</div>
    <h1 class="li-title">Coach Séance</h1>
    <p class="li-sub">Jeannine Manuel School · 2026</p>
  </div>
  <div class="li-instruct">Appuie sur ton nom</div>
  <div class="stu-scroll" id="stu-list"></div>
  <div class="li-foot">
    <button id="go-btn" class="go-btn" disabled onclick="goSessions()">Choisir ma séance →</button>
  </div>
</div>

<!-- SESSIONS -->
<div id="s-sessions" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="show('login')">← Changer</button>
    <span class="stu-hdr" id="hdr-name"></span>
    <span class="vma-pill" id="hdr-vma"></span>
    <button class="hist-icon-btn" onclick="showHistory('sessions')">📋</button>
  </div>
  <div class="sec-ttl">Choisir la séance</div>
  <div class="ses-list" id="ses-list"></div>
</div>

<!-- PREVIEW -->
<div id="s-preview" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="show('sessions')">← Séances</button>
    <span class="stu-hdr" id="prev-stu"></span>
  </div>
  <div class="prev-content" id="prev-content"></div>
</div>

<!-- RECAP -->
<div id="s-recap" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="exitSes()">← Accueil</button>
    <span class="stu-hdr" id="recap-stu"></span>
  </div>
  <div class="recap-scroll" id="recap-content"></div>
</div>

<!-- HISTORIQUE -->
<div id="s-history" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="hist-back-btn" onclick="histBack()">← Retour</button>
    <span class="stu-hdr">Mes séances</span>
  </div>
  <div class="hist-list" id="hist-list"></div>
</div>

<!-- ACTIVE -->
<div id="s-active" class="screen">
  <div class="act-topbar">
    <button class="act-back" onclick="confirmExit()">✕</button>
    <span class="act-sesname" id="act-name"></span>
    <span class="act-prog-lbl" id="act-prog-lbl"></span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="type-badge"><span class="type-pill" id="type-pill">EFFORT</span></div>
  <div class="act-main" id="act-main"></div>
  <div class="act-ctrl" id="act-ctrl">
    <div class="next-prev" id="next-prev"></div>
    <div class="ctrl-row">
      <button class="btn-back" id="btn-back" onclick="goBackPhase()" disabled>←</button>
      <button class="btn-pause" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
      <button class="btn-next" id="btn-next" onclick="confirmSkip()">Suivant →</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function tSec(t){var p=String(t).replace(/"/g,'').split("'");return parseInt(p[0])*60+parseInt(p[1]);}
function vKmh(d,s){return(d/s)*3.6;}
function tCib(d,v){return Math.round(d/(v/3.6));}
function durStr(s){s=Math.round(s);if(s<60)return s+'"';return Math.floor(s/60)+"'"+String(s%60).padStart(2,'0')+'"';}
function fmt(s){s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

var FG=1.22,FF=1.15;
function getVMA(el){
  var f=el.sexe==='F'?FF:FG,def=el.sexe==='F'?13:14;
  var hT=!!el.t500_1,hV=el.vmaVauss!=null;
  if(hV){
    var vV=el.vmaVauss;
    if(hT){var sMin=Math.min(tSec(el.t500_1),tSec(el.t500_2)),vT=vKmh(500,sMin)/f,r=vV/vT;
      if(r>=0.85&&r<=1.20)return Math.round((0.6*vV+0.4*vT)*10)/10;return vV;}
    return vV;}
  if(hT){var s=Math.min(tSec(el.t500_1),tSec(el.t500_2));return Math.round(vKmh(500,s)/f*10)/10;}
  return def;
}
function calcAFL1(el){
  if(!el.t500_1)return null;
  var s1=tSec(el.t500_1),s2=tSec(el.t500_2),s3=tSec(el.t250_1),s4=tSec(el.t250_2);
  return{ecC:Math.abs(s2-s1),ecD:Math.min(s1,s2)-(s3+s4)};
}
function getProfil(el){
  var b=calcAFL1(el);
  if(!b)return'regulier';
  if(b.ecC>=9)return'decrochage';
  if(b.ecD<=0)return'250_lent';
  return'regulier';
}

// ═══════════════════════════════════════════
var actx=null;
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(freq,ms,vol){
  try{var c=getCtx();if(c.state==='suspended')c.resume();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.value=freq;g.gain.setValueAtTime(vol||0.35,c.currentTime);
    o.start(c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+ms/1000);
    o.stop(c.currentTime+ms/1000+0.05);
  }catch(e){}
}
function sndStart(type){
  if(type==='effort'){beep(880,70);setTimeout(()=>beep(880,70),110);setTimeout(()=>beep(1100,220),230);}
  else if(type==='rest'){beep(660,70);setTimeout(()=>beep(660,280),110);}
  else if(type==='recovery'){beep(440,140);setTimeout(()=>beep(550,140),190);}
  else if(type==='done'){beep(660,90);setTimeout(()=>beep(880,90),160);setTimeout(()=>beep(1100,400),320);}
}
function sndTick(){beep(880,60,0.25);}

  phases.forEach(function(p){
    if(p.type==='done')return;
    var dot=typeCol[p.type]||p.col||'#888';
    var ds=p.duration?durStr(p.duration):'→';
    var pl=p.plots?' · 🎯 '+p.plots+' plots':'';
    rows+='<div class="prev-phase-row"><div class="prev-dot" style="background:'+dot+'"></div>'+

      '<div class="prev-dur2">'+ds+'</div></div>';
  });
  var total=phases.filter(function(p){return p.type!=='info'&&p.type!=='done';}).reduce(function(a,p){return a+p.duration;},0);
  document.getElementById('prev-content').innerHTML=
    '<div class="prev-banner" style="background:'+m.c+'18;border:1px solid '+m.c+'35">'+
    '<div class="prev-num">'+m.i+' Séance '+n+'</div>'+

}

  wake();
  document.getElementById('act-name').textContent='Séance '+SNUM+' · '+STU.nom.split(' ')[0];
  show('active');
  runPhase(0);
}

// ═══════════════════════════════════════════
// PHASE RENDERING
// ═══════════════════════════════════════════
function runPhase(idx){
  if(idx>=PHASES.length)return;
  CUR=idx;stopTimer();
  var bb=document.getElementById('btn-back');
  if(bb){bb.disabled=(idx===0);}
  var p=PHASES[idx];

  // Background
  document.getElementById('s-active').style.background=p.bg||'#0b0e1a';

  // Progress bar (count timed phases)
  var timed=PHASES.filter(function(x){return x.type!=='info'&&x.type!=='done';});
  var done=PHASES.filter(function(x,i){return x.type!=='info'&&x.type!=='done'&&i<idx;});
  var pct=timed.length?done.length/timed.length*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('act-prog-lbl').textContent=timed.length?(done.length+1)+'/'+timed.length:'';

  // Type badge
  var tL={effort:'EFFORT',rest:'RÉCUP',recovery:'RÉCUPÉRATION',info:'INFO',done:'TERMINÉ'};
  var tB={effort:'rgba(249,115,22,.35)',rest:'rgba(52,211,153,.3)',recovery:'rgba(6,182,212,.3)',info:'rgba(139,92,246,.3)',done:'rgba(74,222,128,.35)'};
  document.getElementById('type-pill').textContent=tL[p.type]||p.type;
  document.getElementById('type-pill').style.background=tB[p.type]||'rgba(255,255,255,.15)';

  var main=document.getElementById('act-main');
  var ctrl=document.getElementById('act-ctrl');

  if(p.type==='info'){
    ctrl.style.display='none';stopTimer();
    // Collecter les phases suivantes jusqu'à la prochaine info/done
    var nxt=[];
    for(var ni=CUR+1;ni<PHASES.length&&PHASES[ni].type!=='info'&&PHASES[ni].type!=='done';ni++)nxt.push(PHASES[ni]);
    var efforts=nxt.filter(function(x){return x.type==='effort';});
    var rests=nxt.filter(function(x){return x.type==='rest'||x.type==='recovery';});
    var tgtH='';
    if(efforts.length){
      var rows=[];
      var allSame=efforts.length>1&&efforts.every(function(e){return e.duration===efforts[0].duration&&e.plots===efforts[0].plots;});
      if(allSame){
        rows.push({lbl:efforts.length+' × effort',time:durStr(efforts[0].duration),plots:efforts[0].plots?efforts[0].plots+' plots':'',eff:true});
      } else {
        efforts.forEach(function(e){rows.push({lbl:e.label,time:durStr(e.duration),plots:e.plots?e.plots+' plots':'',eff:true});});
      }
      if(rests.length&&rests[0].duration){
        var rLbl=rests.length>1?'Récup (entre chaque)':rests[0].label;
        rows.push({lbl:rLbl,time:durStr(rests[0].duration),plots:'',eff:false});
      }
      tgtH='<div class="info-targets"><div class="info-tgt-ttl">Tes objectifs</div>';
      rows.forEach(function(r){
        tgtH+='<div class="info-tgt-row"><span class="info-tgt-lbl">'+(r.eff?'🏃 ':'⏸ ')+r.lbl+'</span>'+
          '<span class="info-tgt-right"><span class="info-tgt-time">'+r.time+'</span>'+(r.plots?'<span class="info-tgt-plots">'+r.plots+'</span>':'')+'</span></div>';
      });
      tgtH+='</div>';
    }
    var ic=CUR===0?'🏃':p.label.includes('Annonce')?'🎙️':p.label.includes('SIMULATION')?'🏁':'💪';
    main.innerHTML='<div class="info-icon">'+ic+'</div>'+
      '<div class="info-title">'+p.label+'</div>'+
      '<div class="info-desc">'+p.desc+'</div>'+
      tgtH+
      (p.hint?'<div class="hint-box">'+p.hint+'</div>':'')+
      '<div style="margin-top:22px"><button class="ready-btn" onclick="nextPhase()">Prêt &nbsp;›</button></div>';
  }
  else if(p.type==='done'){
    ctrl.style.display='none';stopTimer();unwake();sndStart('done');
    main.innerHTML='<div class="done-icon">🎉</div>'+
      '<div class="done-title">'+p.label+'</div>'+
      '<div class="done-sub">'+p.desc+'</div>'+
      (p.hint?'<div class="hint-box">'+p.hint+'</div>':'')+
      '<div style="margin-top:22px;display:flex;flex-direction:column;gap:12px;align-items:center">'+
      (RESULTS.length?'<button class="ready-btn" onclick="showRecap()">📊 Voir mon bilan →</button>':'')+
      '<button class="home-btn" onclick="exitSes()">← Retour à l\'accueil</button>'+
      '</div>';
  }
  else{
    ctrl.style.display='';
    var nx=PHASES[idx+1];
    document.getElementById('next-prev').innerHTML=nx?'Prochain : <strong>'+nx.label+'</strong>'+(nx.duration?' · '+durStr(nx.duration):''):'';
    // Bouton selon mode
    var nb=document.getElementById('btn-next');
    if(p.isStopwatch){
      nb.className='btn-stop';nb.textContent='⏹ Arrêter';nb.onclick=stopEffort;
    } else {
      nb.className='btn-next';nb.textContent='Suivant →';nb.onclick=confirmSkip;
    }
    renderTimed(p);
    startTimer(p);
    sndStart(p.type);
  }
}

function renderTimed(p){
  var main=document.getElementById('act-main');
  var isSW=!!p.isStopwatch;
  var initOff=isSW?CIRC:0; // vide au départ pour chrono montant
  var subTxt=isSW?'ÉCOULÉ':'RESTANT';
  var targetH=isSW&&p.duration?'<div class="target-row">🎯 Objectif :<strong>'+durStr(p.duration)+'</strong></div>':'';
  var plotsH=p.plots?'<div class="plots-wrap"><div class="plots-big" style="color:'+p.col+';text-shadow:0 0 24px '+p.col+'66">'+p.plots+'</div><div class="plots-lbl">'+p.plbl+'</div></div>':'';
  var spdH=p.spd?'<div class="spd-lbl">⚡ '+p.spd+' km/h</div>':(p.desc?'<div class="spd-lbl">'+p.desc+'</div>':'');
  main.innerHTML=(p.ser?'<div class="ser-lbl">'+p.ser+'</div>':'')+
    '<div class="phase-lbl">'+p.label+'</div>'+
    '<div class="ring-wrap">'+
      '<svg width="220" height="220" viewBox="0 0 220 220" style="transform:rotate(-90deg)">'+
        '<circle class="ring-bg" cx="110" cy="110" r="90" stroke-width="12"/>'+
        '<circle class="ring-arc" id="ring" cx="110" cy="110" r="90" stroke="'+p.col+'" stroke-width="12" stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+initOff+'"/>'+
      '</svg>'+
      '<div class="ring-txt"><div class="t-val" id="tdisp">0:00</div><div class="t-sub">'+subTxt+'</div></div>'+
    '</div>'+
    targetH+plotsH+spdH+
    (p.hint?'<div class="hint-box">'+p.hint+'</div>':'');
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function startTimer(p){
  TL=p.duration;TT=p.duration;TE=0;STOPWATCH=!!p.isStopwatch;PAUSED=false;
  document.getElementById('btn-pause').textContent='⏸ Pause';
  updDisp();updRing();
  TID=setInterval(function(){
    if(PAUSED)return;
    if(STOPWATCH){
      TE++;updDisp();updRing();
      if(TT>0&&TE===TT){sndStart('rest');flash();} // signal : objectif atteint
    } else {
      TL--;updDisp();updRing();
      if(TL<=5&&TL>0){sndTick();flash();}
      if(TL<=0)nextPhase();
    }
  },1000);
}
function stopTimer(){if(TID){clearInterval(TID);TID=null;}}
function updDisp(){var el=document.getElementById('tdisp');if(el)el.textContent=STOPWATCH?fmt(TE):fmt(TL);}
function updRing(){
  var arc=document.getElementById('ring');if(!arc)return;
  if(STOPWATCH){
    var ratio=TT>0?Math.min(TE/TT,1):0;
    arc.style.strokeDashoffset=String(CIRC*(1-ratio));
    arc.style.stroke=(TE>=TT&&TT>0)?'#4ade80':(PHASES[CUR]?PHASES[CUR].col:'#fff');
  } else {
    var offset=TT>0?(TL/TT)*CIRC:0;
    arc.style.strokeDashoffset=String(CIRC-offset);
    if(TL<=5&&TL>0)arc.style.stroke='#ff4444';
    else arc.style.stroke=PHASES[CUR]?PHASES[CUR].col:'#fff';
  }
}
function flash(){var el=document.getElementById('tdisp');if(!el)return;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
function togglePause(){
  PAUSED=!PAUSED;
  document.getElementById('btn-pause').textContent=PAUSED?'▶ Reprendre':'⏸ Pause';
  if(!PAUSED&&actx&&actx.state==='suspended')actx.resume();
}
function nextPhase(){stopTimer();if(CUR+1<PHASES.length)runPhase(CUR+1);}
function confirmSkip(){
  var p=PHASES[CUR];
  if(p.type==='info'||p.type==='done'){nextPhase();return;}
  if(TL>5&&!confirm('Passer à la phase suivante ?'))return;
  nextPhase();
}
function goBackPhase(){
  if(CUR<=0)return;
  var prev=PHASES[CUR-1];
  var lastR=RESULTS[RESULTS.length-1];
  var willErase=prev&&prev.isStopwatch&&lastR&&(lastR.label===(prev.ser||prev.label));
  if(willErase){
    if(!confirm('Revenir en arrière effacera le temps enregistré pour cette course. Confirmer ?'))return;
    RESULTS.pop();
  }
  stopTimer();
  runPhase(CUR-1);
}
function stopEffort(){
  if(!confirm('Arrêter le chrono et enregistrer ce temps ?'))return;
  var actual=TE;stopTimer();
  var p=PHASES[CUR];
  RESULTS.push({label:p.ser||p.label,target:p.duration,actual:actual,col:p.col||'#fff'});
  nextPhase();
}

function saveHistory(){
  try{
    var h=JSON.parse(localStorage.getItem('coach_history')||'[]');
    h.unshift({
      ts:Date.now(),
      date:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}),
      heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
      nom:STU.nom,
      seance:SNUM,
      results:RESULTS.map(function(r){return{label:r.label,target:r.target,actual:r.actual,col:r.col||'#fff'};})
    });
    if(h.length>100)h=h.slice(0,100);
    localStorage.setItem('coach_history',JSON.stringify(h));
  }catch(e){}
}
var HIST_FROM='sessions';
function showHistory(from){
  HIST_FROM=from||'sessions';
  try{var h=JSON.parse(localStorage.getItem('coach_history')||'[]');}catch(e){var h=[];}
  var el=document.getElementById('hist-list');
  if(!h.length){
    el.innerHTML='<div class="hist-empty">📭<br><br>Aucune séance enregistrée<br>pour le moment.<br><br>Complète une séance pour voir<br>ton historique ici.</div>';
    show('history');return;
  }
  var html='';
  h.forEach(function(e){
    html+='<div class="hist-entry">';
    html+='<div class="hist-hdr"><div><div class="hist-name">'+e.nom+'</div><div class="hist-meta">'+e.date+' à '+e.heure+'</div></div>';
    html+='<span class="hist-ses-pill">Séance '+e.seance+'</span></div>';
    html+='<div class="hist-divider"></div>';
    html+='<div>';
    e.results.forEach(function(r,i){
      var badge='';
      if(r.target){
        var delta=r.actual-r.target,abs=Math.abs(delta);
        badge=delta<0?'<span class="recap-badge badge-ok">-'+durStr(abs)+'</span>':
              delta<=2?'<span class="recap-badge badge-ok">✓</span>':
              '<span class="recap-badge badge-slow">+'+durStr(abs)+'</span>';
      }
      html+='<div class="hist-row"><span class="hist-row-lbl">'+(i+1)+'. '+r.label+'</span>'+
        '<div class="hist-row-right"><span class="hist-row-time">'+fmt(r.actual)+'</span>'+badge+'</div></div>';
    });
    html+='</div></div>';
  });
  html+='<button class="hist-clear-btn" onclick="clearHistory()">🗑 Effacer tout l\'historique</button>';
  el.innerHTML=html;
  show('history');
}
function histBack(){show(HIST_FROM);}
function clearHistory(){
  if(!confirm('Effacer tout l\'historique ?'))return;
  localStorage.removeItem('coach_history');
  showHistory(HIST_FROM);
}

function showRecap(){
  saveHistory();
  document.getElementById('recap-stu').textContent=STU.nom.split(' ')[0]+' · Séance '+SNUM;
  var html='<div class="recap-hero"><div class="recap-icon">📊</div>'+
    '<div class="recap-title">Bilan de séance</div>'+
    '<div class="recap-sub">Séance '+SNUM+' · '+STU.nom+'</div></div>'+
    '<div class="recap-sec">Efforts réalisés — '+RESULTS.length+' course'+(RESULTS.length>1?'s':'')+'</div>';
  RESULTS.forEach(function(r,i){
    var actualStr=fmt(r.actual);
    var targetStr=r.target?durStr(r.target):'—';
    var badge='<span class="recap-badge badge-na">—</span>';
    if(r.target){
      var delta=r.actual-r.target;
      var abs=Math.abs(delta);
      var sign=delta<=0?'':'+';
      badge=delta<=2?
        '<span class="recap-badge badge-ok">'+(delta<=0?sign+durStr(abs).replace(/^0'/,''):'+'+durStr(abs))+'</span>':
        '<span class="recap-badge badge-slow">+'+durStr(abs)+'</span>';
      if(delta<0)badge='<span class="recap-badge badge-ok">-'+durStr(abs)+'</span>';
    }
    html+='<div class="recap-row">'+
      '<div class="recap-num" style="background:'+(r.col)+'33;color:'+r.col+'">'+(i+1)+'</div>'+
      '<div class="recap-info">'+
        '<div class="recap-lbl">'+r.label+'</div>'+
        '<div class="recap-target">Objectif : '+targetStr+'</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div class="recap-actual">'+actualStr+'</div>'+
        badge+
      '</div></div>';
  });
  html+='<button class="recap-hist-btn" onclick="showHistory(\'recap\')">📋 Voir l\'historique complet</button>';
  html+='<button class="recap-home-btn" onclick="exitSes()">← Retour à l\'accueil</button>';
  document.getElementById('recap-content').innerHTML=html;
  show('recap');
}

function confirmExit(){if(confirm('Quitter la séance en cours ?'))exitSes();}
function exitSes(){stopTimer();unwake();show('sessions');}
</script>
